<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>强大于你</title>

    <!-- Ensure paths work on GitHub Pages -->
    <base href="https://notrexed.github.io/Unblocked-Games/Stronger-Than-You/">

    <!-- Standardised web app manifest -->
    <link rel="manifest" href="appmanifest.json" />

    <!-- Allow fullscreen mode on iOS devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" sizes="256x256" href="icon-256.png" />
    <meta name="HandheldFriendly" content="true" />

    <!-- Chrome for Android web app tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="shortcut icon" sizes="256x256" href="icon-256.png" />

    <style>
        * { padding: 0; margin: 0; }
        html, body {
            background: #000;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            touch-action: none;
        }
    </style>
</head>

<body>
    <div id="fb-root"></div>

    <!-- Removed the "file://" warning script -->

    <!-- The canvas must be inside a div called c2canvasdiv -->
    <div id="c2canvasdiv">
        <canvas id="c2canvas" width="960" height="560">
            <h1>Your browser does not appear to support HTML5.</h1>
        </canvas>
    </div>

    <!-- Scripts -->
    <script src="jquery-3.4.1.min.js"></script>
    <script src="c2runtime.js"></script>

    <script>
        // Start the Construct 2 project running on window load.
        jQuery(document).ready(function () {
            cr_createRuntime("c2canvas");
        });

        // Pause and resume on page becoming visible/invisible
        function onVisibilityChanged() {
            cr_setSuspended(document.hidden || document.mozHidden || document.webkitHidden || document.msHidden);
        }

        document.addEventListener("visibilitychange", onVisibilityChanged, false);
        document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("msvisibilitychange", onVisibilityChanged, false);

        function OnRegisterSWError(e) {
            console.warn("Failed to register service worker: ", e);
        }

        // Register the service worker for offline support
        window.C2_RegisterSW = function C2_RegisterSW() {
            if (!navigator.serviceWorker) return;
            try {
                navigator.serviceWorker.register("sw.js", { scope: "./" })
                    .then(reg => console.log("Registered service worker on " + reg.scope))
                    .catch(OnRegisterSWError);
            } catch (e) {
                OnRegisterSWError(e);
            }
        };
    </script>
</body>
</html>
